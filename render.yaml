# Blueprint de Render. Con este archivo, en Render puedes elegir
# "New > Blueprint", apuntar a este repositorio y se configura todo solo.
services:
  - type: web
    name: equipos-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      # Node 24: incluye el módulo integrado node:sqlite sin necesidad de flags.
      - key: NODE_VERSION
        value: "24"
